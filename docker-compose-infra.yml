services:
    # 1. REDIS
    redis:
        image: redis:latest
        container_name: redis-cache
        ports:
            - "6379:6379"
        networks:
            - microservices-net

    # 2. KAFKA
    kafka:
        image: apache/kafka:latest
        container_name: kafka-broker
        ports:
            - "9092:9092"
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        networks:
            - microservices-net

    # 3. ELASTICSEARCH
    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
        container_name: elasticsearch
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
        ports:
            - "9200:9200"
        networks:
            - microservices-net

    # 4. LOGSTASH (Nhận log từ Spring Boot và đẩy vào Elasticsearch)
    logstash:
        image: docker.elastic.co/logstash/logstash:9.3.2
        container_name: logstash
        volumes:
            - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
        ports:
            - "5000:5000/tcp" # Port để Spring Boot bắn log tới
        depends_on:
            - elasticsearch
        networks:
            - microservices-net

    # 5. KIBANA (Giao diện xem log)
    kibana:
        image: docker.elastic.co/kibana/kibana:9.3.2
        container_name: kibana
        environment:
            - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
        ports:
            - "5601:5601"
        depends_on:
            - elasticsearch
        networks:
            - microservices-net

networks:
    microservices-net:
        driver: bridge
