_format_version: "3.0"
services:
    - name: user-service
      url: http://host.docker.internal:9001
      routes:
          - name: user-service-route
            paths:
                - /api/auth
                - /api/user
                - /api/role
                - /api/permission
                - /api/profile
            strip_path: false

    - name: business-service
      url: http://host.docker.internal:9002
      routes:
          - name: business-service-customer-route
            paths:
                - /api/customer
            strip_path: false
          - name: business-service-chemical-route
            paths:
                - /api/chemical
            strip_path: false
